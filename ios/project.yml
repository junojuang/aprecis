name: MicrolearningApp
options:
  bundleIdPrefix: com.microlearning
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    ENABLE_PREVIEWS: YES
    SUPABASE_URL: ""
    SUPABASE_ANON_KEY: ""

schemes:
  MicrolearningApp:
    build:
      targets:
        MicrolearningApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  MicrolearningApp:
    type: application
    platform: iOS
    sources:
      - path: MicrolearningApp
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.microlearning.app
        INFOPLIST_FILE: MicrolearningApp/Info.plist
        DEVELOPMENT_TEAM: ""   # Set your Apple Team ID here
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: MicrolearningApp/Info.plist
      properties:
        CFBundleName: Microlearning
        CFBundleDisplayName: Microlearning
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
