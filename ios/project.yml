name: MicrolearningApp
options:
  bundleIdPrefix: com.microlearning
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    ENABLE_PREVIEWS: YES
    SUPABASE_URL: ""
    SUPABASE_ANON_KEY: ""

schemes:
  MicrolearningApp:
    build:
      targets:
        MicrolearningApp: all
    run:
      config: Debug
      storeKitConfiguration: MicrolearningApp/Resources/Aprecis.storekit
    test:
      config: Debug
      storeKitConfiguration: MicrolearningApp/Resources/Aprecis.storekit
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  MicrolearningApp:
    type: application
    platform: iOS
    sources:
      - path: MicrolearningApp
        excludes:
          - "**/*.md"
          - "**/.DS_Store"
      - path: ../data/curated-paper-catalog.json
        buildPhase: resources
    entitlements:
      path: MicrolearningApp/MicrolearningApp.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    dependencies:
      - sdk: WebKit.framework
      - sdk: AuthenticationServices.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: aprecis.app
        INFOPLIST_FILE: MicrolearningApp/Info.plist
        DEVELOPMENT_TEAM: "Y4648M7S2X"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: MicrolearningApp/Info.plist
      properties:
        CFBundleName: Aprecis
        CFBundleDisplayName: Aprecis
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "3"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        ITSAppUsesNonExemptEncryption: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
