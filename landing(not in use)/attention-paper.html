<script type="text/babel">

/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════════════════ */
const C = {

  tealMid:'#2db8b8', amber:'#e8a020', amberLight:'#fef3e2',
  muted:'#8a8f9a', card:'#ffffff', border:'rgba(15,17,23,0.08)',

const serif = '"Lora","Georgia",serif';
const hexRgb = h => { const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `${r},${g},${b}`; };

/* ═══════════════════════════════════════════════════════════════
   iOS CHROME
═══════════════════════════════════════════════════════════════ */

          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>

function IOSDevice({ children }) {
  return (

      width:402, height:874, borderRadius:48, overflow:'hidden',

      boxShadow:'0 40px 80px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.14)',
      fontFamily:'-apple-system,system-ui,sans-serif',

      <div style={{height:'100%',display:'flex',flexDirection:'column',paddingTop:50}}>{children}</div>

}

/* ═══════════════════════════════════════════════════════════════
   SHARED UI
═══════════════════════════════════════════════════════════════ */
const Pill = ({children,color=C.teal,bg=C.tealLight,size=10}) =>
  <span style={{padding:'3px 8px',background:bg,borderRadius:99,fontSize:size,fontWeight:600,color,letterSpacing:.4}}>{children}</span>;

const SectionLabel = ({children}) =>
  <div style={{fontSize:10.5,fontWeight:600,letterSpacing:1.3,color:C.muted,textTransform:'uppercase',padding:'6px 20px 8px'}}>{children}</div>;

function TabBar() {
  const tabs=[
    {id:'home',label:'Home',path:'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z'},
    {id:'search',label:'Search',path:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0'},
    {id:'bundles',label:'Bundles',path:'M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10'},

function ScrollProgressBar({prog}) {
  return (
    <div style={{position:'absolute',top:0,left:0,right:0,height:3,zIndex:30,background:'rgba(26,138,138,0.1)'}}>
      <div style={{height:3,width:`${prog*100}%`,background:C.teal,transition:'width .06s linear',borderRadius:'0 2px 2px 0'}}/>
    </div>
  );
}

function useScrollProgress(ref) {
  const [prog,setProg]=React.useState(0);
  const onScroll=React.useCallback(()=>{
    const el=ref.current; if(!el) return;
    const max=el.scrollHeight-el.clientHeight;
    setProg(max>0?Math.min(el.scrollTop/max,1):0);
  },[ref]);
  return {prog,onScroll};
}

/* ═══════════════════════════════════════════════════════════════
   DIAGRAM 1 — Attention Heatmap
   Interactive 6×6 token × token attention matrix.
   Click any row to highlight that token's attention pattern.
═══════════════════════════════════════════════════════════════ */
function DiagAttentionHeatmap() {
  const [activeRow,setActiveRow]=React.useState(null);
  const [vis,setVis]=React.useState(false);
  React.useEffect(()=>{const t=setTimeout(()=>setVis(true),80);return()=>clearTimeout(t);},[]);

  const tokens = ['The','cat','sat','on','the','mat'];
  const W = [
    [.82,.07,.04,.03,.02,.02],
    [.09,.68,.09,.05,.05,.04],
    [.03,.28,.43,.11,.09,.06],
    [.03,.05,.14,.70,.04,.04],
    [.42,.06,.05,.06,.35,.06],
    [.03,.11,.28,.06,.10,.42],
  ];
  const cell = 36;

  return (
    <div style={{padding:'12px 6px 8px'}}>
      {/* Column headers */}
      <div style={{display:'flex',marginLeft:32,marginBottom:2}}>
        {tokens.map((t,j)=>(
          <div key={j} style={{width:cell,fontSize:7,color:activeRow===j?C.teal:C.muted,textAlign:'center',fontWeight:600,transition:'color .2s'}}>{t}</div>
        ))}
      </div>
      {/* Grid */}
      {W.map((row,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',marginBottom:2,cursor:'pointer'}} onClick={()=>setActiveRow(activeRow===i?null:i)}>
          <div style={{width:28,fontSize:7,color:activeRow===i?C.teal:C.muted,fontWeight:600,textAlign:'right',paddingRight:4,transition:'color .2s'}}>{tokens[i]}</div>
          {row.map((w,j)=>{
            const hot=activeRow===i;
            const alpha=hot?Math.min(w*1.35,.98):w*.88;
            return (
              <div key={j} style={{
                width:cell-2,height:cell-2,margin:1,borderRadius:4,
                background:`rgba(26,138,138,${alpha})`,
                opacity:vis?(activeRow!==null&&!hot?.3:1):0,
                transition:`opacity ${.28+(i*6+j)*.012}s ease, background .2s`,
                display:'flex',alignItems:'center',justifyContent:'center',
              }}>
                {hot&&w>.12&&<span style={{fontSize:6.5,color:w>.35?'white':C.teal,fontWeight:700}}>{Math.round(w*100)}</span>}
              </div>
            );
          })}
        </div>
      ))}
      {/* Legend */}
      <div style={{display:'flex',alignItems:'center',gap:6,marginTop:10,marginLeft:32}}>
        <div style={{width:56,height:6,borderRadius:3,background:'linear-gradient(to right,rgba(26,138,138,.05),rgba(26,138,138,.95))'}}/>
        <span style={{fontSize:7.5,color:C.muted}}>low → high attention</span>
        <span style={{marginLeft:'auto',fontSize:7.5,color:activeRow!==null?C.teal:C.muted,fontStyle:'italic'}}>
          {activeRow!==null?`"${tokens[activeRow]}" attends to →`:'tap a row'}
        </span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   DIAGRAM 2 — Multi-Head Attention
   8 parallel attention heads, each learning a different pattern.
   Tap a head to expand and inspect what it focuses on.
═══════════════════════════════════════════════════════════════ */
function DiagMultiHead() {
  const [active,setActive]=React.useState(null);
  const heads = [
    {name:'Syntax',  color:'#1a8a8a', pat:[.80,.05,.10,.03,.01,.01], desc:'subject-verb agreement'},
    {name:'Coref',   color:'#e8a020', pat:[.02,.04,.01,.04,.82,.07], desc:'pronoun → noun links'},
    {name:'Semantic',color:'#7b4ba4', pat:[.04,.72,.10,.04,.05,.05], desc:'word meaning similarity'},
    {name:'Position',color:'#c0573c', pat:[.01,.16,.70,.09,.03,.01], desc:'adjacent word context'},
    {name:'Entity',  color:'#2d7abf', pat:[.08,.02,.01,.01,.02,.86], desc:'named entity focus'},
    {name:'Topic',   color:'#2a8a4a', pat:[.19,.15,.14,.16,.19,.17], desc:'global topic signal'},
    {name:'Dep',     color:'#8a4a1a', pat:[.01,.02,.04,.01,.88,.04], desc:'dependency structure'},
    {name:'Long',    color:'#5a1a8a', pat:[.09,.01,.01,.01,.04,.84], desc:'long-range context'},
  ];
  const tokens = ['The','cat','sat','on','the','mat'];

  return (
    <div style={{padding:'10px 6px'}}>
      <div style={{fontSize:8,fontWeight:700,color:C.muted,letterSpacing:.6,textAlign:'center',marginBottom:10,textTransform:'uppercase'}}>Tap a head to inspect</div>
      {heads.map((h,i)=>{
        const isA=active===i;
        return (
          <div key={i} onClick={()=>setActive(active===i?null:i)} style={{display:'flex',alignItems:'center',gap:5,marginBottom:4,cursor:'pointer'}}>
            <div style={{width:42,fontSize:6.5,fontWeight:700,color:isA?h.color:C.muted,textAlign:'right',lineHeight:1.3,transition:'color .2s',flexShrink:0}}>
              H{i+1}<br/><span style={{fontWeight:400}}>{h.name}</span>
            </div>
            {h.pat.map((w,j)=>(
              <div key={j} style={{
                flex:1,height:isA?26:16,borderRadius:3,
                background:`rgba(${hexRgb(h.color)},${w*.92+.04})`,
                transition:'height .22s',
                display:'flex',alignItems:'center',justifyContent:'center',
              }}>
                {isA&&w>.2&&<span style={{fontSize:6,color:'white',fontWeight:700}}>{tokens[j]}</span>}
              </div>
            ))}
          </div>
        );
      })}
      {active!==null&&(
        <div style={{marginTop:8,padding:'6px 10px',background:C.tealLight,borderRadius:8,fontSize:8.5,color:C.teal,fontWeight:600,animation:'fadeUp .25s ease'}}>
          Head {active+1} · <strong>{heads[active].name}</strong>: learns {heads[active].desc}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   DIAGRAM 3 — Positional Encoding (Sine Waves)
   Each dimension gets a unique sinusoidal frequency.
   Waves animate in on mount to show the encoding being built.
═══════════════════════════════════════════════════════════════ */
function DiagSineWaves() {
  const [prog,setProg]=React.useState(0);
  React.useEffect(()=>{
    let start,raf;
    const fn=(ts)=>{
      if(!start)start=ts;
      const p=Math.min((ts-start)/1800,1);
      setProg(p);
      if(p<1)raf=requestAnimationFrame(fn);
    };
    raf=requestAnimationFrame(fn);
    return()=>cancelAnimationFrame(raf);
  },[]);

  const W=244,H=76;
  const waves=[
    {f:1, c:C.teal,    lw:2,   o:.95, lbl:'dim 0 — f=1×'},
    {f:2, c:C.amber,   lw:1.6, o:.85, lbl:'dim 1 — f=2×'},
    {f:4, c:'#7b4ba4', lw:1.4, o:.75, lbl:'dim 2 — f=4×'},
    {f:8, c:'#2d7abf', lw:1.2, o:.65, lbl:'dim 3 — f=8×'},
  ];
  const mkPath=(f,p)=>{
    const steps=Math.round(60*p);
    if(!steps)return'';
    return Array.from({length:steps+1},(_,i)=>{
      const x=(i/60)*W, y=H/2-Math.sin(i*f*Math.PI/30)*(H/2-10);
      return`${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
  };

  return (
    <div style={{padding:'10px 6px 6px'}}>
      <svg width="100%" viewBox={`0 0 ${W} ${H+20}`} style={{overflow:'visible'}}>
        {[0,H/4,H/2,H*3/4,H].map(y=>(
          <line key={y} x1={0} y1={y} x2={W} y2={y} stroke={C.border} strokeWidth=".5"/>
        ))}
        {[0,1,2,3,4].map(i=>(
          <text key={i} x={i*W/4} y={H+14} fontSize="7" fill={C.muted} textAnchor="middle">pos {i*15}</text>
        ))}
        {waves.map((w,i)=>(
          <path key={i} d={mkPath(w.f,prog)} stroke={w.c} strokeWidth={w.lw} fill="none" strokeOpacity={w.o} strokeLinecap="round"/>
        ))}
      </svg>
      <div style={{display:'flex',flexWrap:'wrap',gap:'6px 14px',marginTop:6}}>
        {waves.map((w,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:4}}>
            <div style={{width:14,height:2.5,borderRadius:1,background:w.c,opacity:w.o}}/>
            <span style={{fontSize:7.5,color:C.muted}}>{w.lbl}</span>
          </div>
        ))}
      </div>
      <div style={{marginTop:8,padding:'6px 10px',background:C.tealLight,borderRadius:8,fontSize:8.5,color:C.teal}}>
        Each position's vector = sum of all wave values at that position → a unique fingerprint
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   DIAGRAM 4 — Encoder–Decoder Architecture
   Full Transformer architecture: 6 encoder + 6 decoder layers.
   Tap each module to learn what it does. Cross-attention bridge
   animates to show how encoder feeds the decoder.
═══════════════════════════════════════════════════════════════ */
function DiagTransformerArch() {
  const [active,setActive]=React.useState(null);

  const enc = [
    {id:'e0',label:'Input Embedding',sub:'+Positional Enc',color:'#2d7abf'},
    {id:'e1',label:'Multi-Head',sub:'Self-Attention',color:C.teal},
    {id:'e2',label:'Add & Norm',sub:'Residual',color:C.muted},
    {id:'e3',label:'Feed-Forward',sub:'Network',color:'#7b4ba4'},
    {id:'e4',label:'Add & Norm',sub:'× N=6',color:C.muted},
  ];
  const dec = [
    {id:'d0',label:'Output Embedding',sub:'+Positional Enc',color:'#2d7abf'},
    {id:'d1',label:'Masked Self-Attn',sub:'Causal masking',color:'#c0573c'},
    {id:'d2',label:'Cross-Attention',sub:'← Encoder output',color:C.teal},
    {id:'d3',label:'Feed-Forward',sub:'Network',color:'#7b4ba4'},
    {id:'d4',label:'Linear + Softmax',sub:'× N=6',color:'#2a8a4a'},
  ];

  const descriptions = {
    e0:'Words are embedded into 512-dim vectors. Sinusoidal positional encodings are added — the model's only sense of position.',
    e1:'Every token attends to every other token bidirectionally. 8 heads in parallel, each learning different patterns.',
    e2:'Residual connections add the input back, then LayerNorm stabilizes training.',
    e3:'Two linear layers (512→2048→512) with ReLU — applied independently to each position.',
    e4:'This full block (self-attn + FFN) repeats N=6 times, building richer representations each pass.',
    d0:'Target tokens (shifted right by one) are embedded + positional encoded — teacher forcing during training.',
    d1:'Self-attention with a causal mask: token i can only attend to tokens ≤ i. Prevents seeing the future.',
    d2:'The decoder queries the encoder\'s final output. This is where translation happens — decoder tokens "look up" relevant source tokens.',
    d3:'Same feedforward as the encoder — 2-layer MLP per position.',
    d4:'Final linear projection to vocab size, then softmax → probability over 37,000 tokens. The N=6 decoder stack repeats the block above this.',
  };

  const colorRgbMap = {
    '#2d7abf':'45,122,191','#c0573c':'192,87,60',
    '#1a8a8a':'26,138,138','#2a8a4a':'42,138,74',
    '#7b4ba4':'123,75,164','#8a8f9a':'138,143,154',
  };

  const Block = ({b}) => {
    const isA=active===b.id;
    const rgb=colorRgbMap[b.color]||'26,138,138';
    return (
      <div onClick={()=>setActive(active===b.id?null:b.id)} style={{
        padding:'6px 8px',borderRadius:8,
        border:`1.5px solid ${isA?b.color:C.border}`,
        background:isA?`rgba(${rgb},.09)`:'white',
        cursor:'pointer',transition:'all .2s',
        marginBottom:4,
      }}>
        <div style={{fontSize:8.5,fontWeight:700,color:isA?b.color:C.ink,lineHeight:1.3}}>{b.label}</div>
        <div style={{fontSize:7,color:isA?b.color:C.muted,marginTop:1}}>{b.sub}</div>
      </div>
    );
  };

  return (
    <div style={{padding:'10px 6px 6px'}}>
      <div style={{display:'flex',gap:10}}>
        {/* Encoder */}
        <div style={{flex:1}}>
          <div style={{fontSize:8,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.6,textAlign:'center',marginBottom:6}}>Encoder</div>
          {enc.map(b=><Block key={b.id} b={b}/>)}
        </div>

        {/* Bridge arrow — cross-attention connection */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',paddingTop:20,gap:0,flexShrink:0,width:24}}>
          <div style={{flex:1,width:1.5,background:`linear-gradient(to bottom, transparent, ${C.teal}, transparent)`,borderRadius:1}}/>
          <svg width="14" height="10" viewBox="0 0 14 10" style={{flexShrink:0}}>
            <path d="M0 5h11M8 2l3 3-3 3" stroke={C.teal} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          <div style={{flex:1,width:1.5,background:`linear-gradient(to bottom, ${C.teal}, transparent)`,borderRadius:1}}/>
        </div>

        {/* Decoder */}
        <div style={{flex:1}}>
          <div style={{fontSize:8,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.6,textAlign:'center',marginBottom:6}}>Decoder</div>
          {dec.map(b=><Block key={b.id} b={b}/>)}
        </div>
      </div>

      {/* Description panel */}
      {active&&descriptions[active]&&(
        <div style={{marginTop:10,padding:'8px 12px',background:C.tealLight,borderRadius:9,fontSize:8.5,color:C.teal,lineHeight:1.5,animation:'fadeUp .2s ease'}}>
          {descriptions[active]}
        </div>
      )}
      {!active&&(
        <div style={{marginTop:8,fontSize:8,color:C.muted,textAlign:'center',fontStyle:'italic'}}>
          tap any block to learn what it does
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   DIAGRAM 5 — QKV Attention Formula
   Visualises the Scaled Dot-Product Attention computation:
   Attention(Q,K,V) = softmax(QKᵀ / √dₖ) · V
   Animates step-by-step with interactive controls.
═══════════════════════════════════════════════════════════════ */
function DiagQKV() {
  const [step,setStep]=React.useState(0);
  React.useEffect(()=>{
    const timers=[
      setTimeout(()=>setStep(1),200),
      setTimeout(()=>setStep(2),700),
      setTimeout(()=>setStep(3),1200),
      setTimeout(()=>setStep(4),1700),
    ];
    return()=>timers.forEach(clearTimeout);
  },[]);

  const show=(s,extra={})=>({
    opacity:step>=s?1:0,
    transform:step>=s?'translateY(0)':'translateY(8px)',
    transition:'opacity .4s, transform .4s',
    ...extra,
  });

  const steps=[
    {id:0,label:'Q (Query)',  color:'#2d7abf', desc:'What am I looking for?',  vec:[.8,.2,.5,.9,.1,.6]},
    {id:1,label:'K (Key)',    color:C.amber,   desc:'What do I offer?',         vec:[.3,.9,.7,.2,.8,.4]},
    {id:2,label:'V (Value)', color:'#7b4ba4',  desc:'What do I give if matched?',vec:[.6,.1,.9,.4,.7,.3]},
  ];

  const scores=[.82,.07,.04,.03,.02,.02];
  const W=230;

  return (
    <div style={{padding:'10px 6px 6px'}}>
      {/* Formula row */}
      <div style={{...show(1),textAlign:'center',fontSize:13,color:C.ink,marginBottom:14,letterSpacing:.5,fontFamily:'monospace'}}>
        <span style={{...show(1),color:'#2d7abf'}}>Q</span>
        <span style={{...show(2),color:C.muted}}> · </span>
        <span style={{...show(2),color:C.amber}}>Kᵀ</span>
        <span style={{...show(2),color:C.muted}}> / √dₖ</span>
        <span style={{...show(3),color:C.muted}}> → softmax → </span>
        <span style={{...show(3),color:C.teal}}>weights</span>
        <span style={{...show(4),color:C.muted}}> · </span>
        <span style={{...show(4),color:'#7b4ba4'}}>V</span>
      </div>

      {/* QKV vector bars */}
      <div style={{display:'flex',gap:10,marginBottom:12}}>
        {steps.map((s,si)=>(
          <div key={s.id} style={{...show(si+1),flex:1}}>
            <div style={{fontSize:8,fontWeight:700,color:s.color,textAlign:'center',marginBottom:4}}>{s.label}</div>
            <div style={{display:'flex',flexDirection:'column',gap:2}}>
              {s.vec.map((v,vi)=>(
                <div key={vi} style={{height:7,borderRadius:2,background:`rgba(${hexRgb(s.color)},.15)`,position:'relative',overflow:'hidden'}}>
                  <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${v*100}%`,background:s.color,borderRadius:2,opacity:.6}}/>
                </div>
              ))}
            </div>
            <div style={{fontSize:6.5,color:C.muted,textAlign:'center',marginTop:3,lineHeight:1.3}}>{s.desc}</div>
          </div>
        ))}
      </div>

      {/* Attention weights output */}
      <div style={{...show(4),padding:'8px 10px',background:'rgba(26,138,138,.06)',borderRadius:8,border:`1px solid rgba(26,138,138,.15)`}}>
        <div style={{fontSize:7.5,fontWeight:700,color:C.teal,marginBottom:6}}>Output attention weights (softmax)</div>
        <div style={{display:'flex',gap:2}}>
          {['The','cat','sat','on','the','mat'].map((t,i)=>(
            <div key={i} style={{flex:1,textAlign:'center'}}>
              <div style={{height:Math.max(scores[i]*48,4),borderRadius:'2px 2px 0 0',background:`rgba(26,138,138,${scores[i]*.9+.05})`,transition:'height .4s'}}/>
              <div style={{fontSize:6.5,color:C.muted,marginTop:2}}>{t}</div>
              <div style={{fontSize:6,color:C.teal,fontWeight:700}}>{Math.round(scores[i]*100)}%</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
