// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

function hexRgb(h){ const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `${r},${g},${b}`; }

function MatrixGrid({rows,cols,fill,fillOpacity,label,borderColor}){
  const cellW=Math.min(52/cols,10), cellH=Math.min(52/rows,10);
  const ops=React.useMemo(()=>Array.from({length:rows*cols},(_,i)=>fillOpacity+((i*13+7)%10)*0.014),[rows,cols,fillOpacity]);
  return(
    <div style={{position:'relative',display:'inline-block'}}>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${cols},${cellW}px)`,gap:1,border:`1.5px solid ${borderColor}`,borderRadius:4,padding:2}}>
        {ops.map((op,i)=><div key={i} style={{width:cellW,height:cellH,background:fill,opacity:op,borderRadius:1}}/>)}
      </div>

/* 9 ── KL Distribution */
function DiagKLDistrib(){
  const [drift,setDrift]=React.useState(0);
  const W=244,H=78;
  const gauss=(x,m,s)=>Math.exp(-.5*((x-m)/s)**2);
  const baseMu=W*.32,driftedMu=baseMu+drift*W*.36,sigma=W*.11;
  const curve=(mu,s,sc=1)=>{const n=50;return Array.from({length:n+1},(_,i)=>{const x=(i/n)*W,y=H-gauss(x,mu,s)*(H-12)*sc;return`${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`;}).join(' ');};
  const kl=(drift*2.8).toFixed(2);
  const danger=drift>.55;
  return(
    <div style={{padding:'10px 6px 4px'}}>
      <svg width="100%" viewBox={`0 0 ${W} ${H+8}`} style={{overflow:'visible'}}>
        <path d={curve(baseMu,sigma)} stroke="#aaa" strokeWidth="1.5" fill="rgba(160,160,160,.12)" strokeDasharray="4,2"/>
        <path d={curve(driftedMu,sigma*.88,.95)} stroke={danger?'#c44':C.teal} strokeWidth="2" fill={`rgba(${danger?'200,68,68':'26,138,138'},.13)`} style={{transition:'stroke .3s,fill .3s'}}/>
        <text x={baseMu} y={H-gauss(baseMu,baseMu,sigma)*(H-12)-9} fontSize="7.5" fill="#aaa" textAnchor="middle">π_ref</text>
        <text x={driftedMu} y={H-gauss(driftedMu,driftedMu,sigma*.88)*(H-12)*.95-9} fontSize="7.5" fill={danger?'#c44':C.teal} textAnchor="middle" fontWeight="700">π_θ</text>
        {drift>.06&&<g>
          <line x1={baseMu} y1={H/2} x2={driftedMu-3} y2={H/2} stroke={danger?'#c44':C.amber} strokeWidth="1.5" strokeDasharray="3,2"/>
          <text x={(baseMu+driftedMu)/2} y={H/2-6} fontSize="8.5" fill={danger?'#c44':C.amber} textAnchor="middle" fontWeight="700">KL={kl}</text>
        </g>}
      </svg>
      <div style={{display:'flex',alignItems:'center',gap:8,marginTop:10}}>
        <span style={{fontSize:8,color:C.muted,whiteSpace:'nowrap'}}>policy drift</span>

function ScrollProgressBar({prog}){

    </div>
  );
}

function useScrollProgress(ref){
  const [prog,setProg]=React.useState(0);
  const onScroll=React.useCallback(()=>{
    const el=ref.current;
    if(!el)return;
    const max=el.scrollHeight-el.clientHeight;
    setProg(max>0?Math.min(el.scrollTop/max,1):0);
  },[ref]);
  return{prog,onScroll};
}

            <span style={{fontSize:11,fontWeight:600,fontStyle:'italic',color:C.teal,fontFamily:serif}}>Aprecis</span>
          </div>
          <p style={{fontSize:12.5,color:'#3a3d45',lineHeight:1.65}}>{paper.summary}</p>
        </div>

        <SectionLabel>Key Concepts</SectionLabel>

        {paper.concepts.map((concept,i)=>{
          const Diag=DIAGRAM_MAP[concept.diagram];
          return(
            <div key={concept.id}
              onMouseEnter={()=>setSeen(s=>{const n=new Set(s);n.add(concept.id);return n;})}
              style={{margin:'0 20px',marginBottom:16,background:C.card,borderRadius:16,overflow:'hidden',border:`1px solid ${C.border}`,boxShadow:'0 3px 14px rgba(0,0,0,.06)'}}
            >
              <div style={{height:3,background:`linear-gradient(to right, ${C.teal}, ${C.tealMid})`}}/>
              <div style={{padding:16}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                  <div style={{width:24,height:24,borderRadius:12,background:C.teal,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <span style={{fontSize:10,fontWeight:700,color:'white'}}>{concept.num}</span>
                  </div>
                  <span style={{fontFamily:serif,fontSize:16,fontWeight:700,color:C.ink}}>{concept.title}</span>
                </div>
                <p style={{fontSize:12.5,color:'#3a3d45',lineHeight:1.65,marginBottom:14}}>{concept.body}</p>
                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14}}>
                  <div style={{fontSize:8.5,fontWeight:600,letterSpacing:.8,color:C.muted,textTransform:'uppercase',marginBottom:10}}>{concept.diagramLabel}</div>
                  {Diag?<Diag/>:<div style={{height:80,background:C.tealLight,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:C.teal}}>Diagram loading…</div>}
                </div>
              </div>
            </div>
          );
        })}

        <div style={{height:24}}/>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════════════════ */
const TWEAK_DEFAULTS = {
  "showBundleProgress": true,
  "cardStyle": "dark",
  "diagramTheme": "teal"
};

function App(){
  const [tweaksOpen,setTweaksOpen]=React.useState(false);
  const [tweaks,setTweaks]=React.useState(()=>{try{const s=localStorage.getItem('aprecis-tweaks');return s?{...TWEAK_DEFAULTS,...JSON.parse(s)}:TWEAK_DEFAULTS;}catch{return TWEAK_DEFAULTS;}});
  const [screen,setScreen]=React.useState({type:'home'});
  const [tab,setTab]=React.useState('home');

  React.useEffect(()=>{
    const h=(e)=>{
      if(e.data?.type==='__activate_edit_mode')setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode')setTweaksOpen(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const setTweak=(k,v)=>{
    const next={...tweaks,[k]:v};
    setTweaks(next);
    localStorage.setItem('aprecis-tweaks',JSON.stringify(next));
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');
  };

  const navigate=(type,data)=>setScreen({type,...data});
  const goBack=()=>setScreen(screen.fromBundle?{type:'bundle',bundle:screen.fromBundle}:{type:'home'});

  return(
    <div style={{display:'flex',gap:40,alignItems:'flex-start',flexWrap:'wrap'}}>
      <div>
        <IOSDevice width={390} height={844}>
          <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.paper}}>
            <div style={{flex:1,overflow:'hidden',position:'relative'}}>
              {screen.type==='home'&&<HomeScreen navigate={navigate}/>}
              {screen.type==='bundle'&&<BundleDetailScreen bundle={screen.bundle} navigate={navigate} onBack={()=>setScreen({type:'home'})}/>}
              {screen.type==='paper'&&<PaperDetailScreen paper={screen.paper} onBack={goBack} fromBundle={screen.fromBundle}/>}
            </div>
            {screen.type==='home'&&<TabBar active={tab} onChange={setTab}/>}
          </div>
        </IOSDevice>
        <div style={{marginTop:14,textAlign:'center',fontSize:11,color:'#555',fontFamily:'-apple-system,system-ui'}}>
          {screen.type==='home'&&'Home · tap a bundle or paper to explore'}
          {screen.type==='bundle'&&'Bundle Detail · tap a paper to read'}
          {screen.type==='paper'&&'Paper Detail · scroll to explore diagrams'}
        </div>
      </div>

      {tweaksOpen&&(
        <div style={{position:'fixed',bottom:24,right:24,background:'white',borderRadius:14,padding:18,width:220,boxShadow:'0 8px 32px rgba(0,0,0,.18)',border:'1px solid rgba(0,0,0,.08)',zIndex:1000,fontFamily:'-apple-system,system-ui'}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:14,color:'#0f1117'}}>Tweaks</div>
          <label>Bundle card style</label>
          <select value={tweaks.cardStyle} onChange={e=>setTweak('cardStyle',e.target.value)} style={{width:'100%',marginBottom:14,padding:'5px 8px',borderRadius:8,border:'1px solid #e0e0e0',fontSize:12}}>
            <option value="dark">Dark header (current)</option>
            <option value="light">Light card</option>
          </select>
          <label>Show bundle progress bar</label>
          <div style={{display:'flex',gap:8,marginBottom:14}}>
            {['true','false'].map(v=>(
              <button key={v} onClick={()=>setTweak('showBundleProgress',v==='true')} style={{flex:1,padding:'5px 0',border:`1px solid ${String(tweaks.showBundleProgress)===v?C.teal:'#e0e0e0'}`,borderRadius:8,background:String(tweaks.showBundleProgress)===v?C.tealLight:'white',fontSize:11,cursor:'pointer',color:String(tweaks.showBundleProgress)===v?C.teal:'#666'}}>{v==='true'?'Show':'Hide'}</button>
            ))}
          </div>
          <label>Diagram accent theme</label>
          <div style={{display:'flex',gap:6}}>
            {[{id:'teal',c:C.teal},{id:'amber',c:C.amber},{id:'purple',c:'#7b4ba4'}].map(t=>(
              <div key={t.id} onClick={()=>setTweak('diagramTheme',t.id)} style={{width:28,height:28,borderRadius:14,background:t.c,cursor:'pointer',border:`3px solid ${tweaks.diagramTheme===t.id?'white':'transparent'}`,boxShadow:tweaks.diagramTheme===t.id?`0 0 0 2px ${t.c}`:'none'}}/>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
