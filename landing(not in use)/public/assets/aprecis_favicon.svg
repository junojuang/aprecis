<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Aprecis">
  <!-- dark teal rounded square fills the canvas, no padding -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="#0e3434"/>
  <!-- italic serif 'a' tuned for small sizes: slightly larger and heavier
       than the app icon glyph so it stays readable down to 16x16 -->
  <text x="50" y="52"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="Georgia, 'EB Garamond', 'Times New Roman', serif"
        font-style="italic"
        font-weight="700"
        font-size="72"
        fill="#6fb3a8">a</text>
</svg>
