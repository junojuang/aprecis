<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aprécis</title>
  <link rel="icon" href="./assets/aprecis_favicon.svg" type="image/svg+xml" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CEG84Y6QSP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CEG84Y6QSP');
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap');

    @font-face {
      font-family: 'Satoshi';
      src: url('./fonts/satoshi/Satoshi_Complete/Fonts/WEB/fonts/Satoshi-Variable.woff2') format('woff2'),
           url('./fonts/satoshi/Satoshi_Complete/Fonts/WEB/fonts/Satoshi-Variable.woff') format('woff');
      font-weight: 300 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #02020a;
      color: #ffffff;
      font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #star-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 20px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(106, 146, 255, 0.8);
    }

    .headline {
      line-height: 1.08;
    }

    .headline .line-sans {
      display: block;
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: clamp(28px, 4vw, 56px);
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .headline .line-serif {
      display: block;
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(28px, 4vw, 56px);
      color: rgba(255, 255, 255, 0.88);
    }

    .subtext {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.38);
      max-width: 320px;
      line-height: 1.7;
    }

    .back-link {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      padding-bottom: 1px;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255, 255, 255, 0.7); }
  </style>
</head>
<body>

<section class="hero">
  <canvas id="star-canvas"></canvas>

  <div class="content">
    <span class="eyebrow">Coming Soon</span>
    <h1 class="headline">
      <span class="line-sans">Something great is</span>
      <span class="line-serif">in the works.</span>
    </h1>
    <p class="subtext">This page is still being built. Check back soon — or get early access while you wait.</p>
    <a href="/" class="back-link">← Back to home</a>
  </div>
</section>

<script>
  const canvas = document.getElementById('star-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, DPR, stars = [];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W   = window.innerWidth;
    H   = window.innerHeight;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    ctx.scale(DPR, DPR);
    initStars();
  }

  function initStars() {
    stars = [];
    const count = Math.round(220 * Math.sqrt((W * H) / (1440 * 900)));
    for (let i = 0; i < count; i++) {
      const d = Math.pow(Math.random(), 2);
      stars.push({
        x: Math.random() * W, y: Math.random() * H,
        r: 0.1 + d * 1.0,
        a: 0.05 + d * 0.45,
        freq:  (Math.random() * 0.4 + 0.1) * 0.001,
        phase: Math.random() * Math.PI * 2,
        hero:  d > 0.8,
      });
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    const bg = ctx.createRadialGradient(W*.5, H*.25, 0, W*.5, H*.5, Math.sqrt(W*W+H*H)*.55);
    bg.addColorStop(0,   'rgba(8,10,28,1)');
    bg.addColorStop(0.6, 'rgba(4,5,14,1)');
    bg.addColorStop(1,   'rgba(2,2,8,1)');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    for (const s of stars) {
      const a = s.a * (0.55 + 0.45 * Math.sin(t * s.freq + s.phase));
      ctx.save();
      if (s.hero) { ctx.shadowColor = `rgba(220,232,255,${a*.8})`; ctx.shadowBlur = s.r * 6; }
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,232,255,${a})`;
      ctx.fill();
      ctx.restore();
    }
  }

  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(function loop(t) { draw(t); requestAnimationFrame(loop); });
</script>
</body>
</html>
