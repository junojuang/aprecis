bel":"Low-rank matrices","note":"Small, trainable updates injected into each layer."},{"label":"Transformer layers","note":"Where LoRA applies its changes."},{"label":"Linear projections","note":"The parts of the model LoRA modifies."},{"label":"Task-specific data","note":"Guides the adaptation process."},{"label":"PyTorch integration","note":"Lets you use LoRA easily in real models."}]},{"kind":"results","kicker":"Why it mattered","title":"LoRA's impact: less memory, same results","body":["LoRA lets you adapt huge models like GPT-3 using only a fraction of the resources. It matches or beats full fine-tuning on many tasks.","Because LoRA keeps the original model frozen, you can store many different adaptations without needing a copy of the whole model each time."],"bars":[{"label":"Trainable parameters","note":"LoRA uses 0.01 percent as many","value":10},{"label":"GPU memory required","note":"LoRA needs 3x less","value":33},{"label":"Performance (accuracy)","note":"Same or better than full fine-tuning","value":100},{"label":"Inference speed","note":"No extra latency","value":100}],"caption":"LoRA keeps adaptation efficient without harming accuracy."},{"kind":"story","kicker":"Takeaway","title":"Why LoRA is a milestone","body":["LoRA made it practical to fine-tune massive models for many users and tasks, without duplicating the entire model each time.","Its low-rank approach inspired a wave of efficient adaptation methods, reshaping how researchers and companies deploy large language models."]},{"kind":"recap","kicker":"Recap","title":"four-line mental model","body":[],"recap":[{"label":"Freeze","note":"Keep the original model's weights unchanged."},{"label":"Inject","note":"Add small low-rank matrices into certain layers."},{"label":"Adapt","note":"Train only the new, efficient parameters."},{"label":"Deploy","note":"Use the same base model for many tasks, saving resources."}]},{"kind":"source","kicker":"Original paper","title":"LoRA: Low-Rank Adaptation of Large Language Models","body":["Read the original paper to see the full details, results, and PyTorch code."]}]}</script>
