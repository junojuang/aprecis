er","kicker":"Build it","title":"Pick your BLIP-2 ingredients","body":["Which parts do you need to assemble a BLIP-2 style system?"],"choices":[{"label":"Frozen Vision Encoder","note":"Extracts image features, stays unchanged."},{"label":"Frozen Large Language Model","note":"Processes language, also unchanged."},{"label":"Query Transformer","note":"Learns to connect vision and language features."},{"label":"Image-Text Pretraining Data","note":"Pairs of images and text for learning the bridge."},{"label":"Linear Projection Layer","note":"Maps features into a common space before the bridge."},{"label":"Task-specific Head","note":"Optional. Adapts the output for classification or generation tasks."}]},{"kind":"results","kicker":"Why it mattered","title":"BLIP-2's surprising performance","body":["BLIP-2 achieves benchmark-leading results on tasks like visual question answering and image captioning, with much less compute.","Its modular design allows rapid adaptation to new tasks and models, making it a practical choice for research and industry."],"bars":[{"label":"Visual QA Accuracy","note":"Outperforms previous models","value":92},{"label":"Image Captioning BLEU","note":"High text quality","value":88},{"label":"Zero-shot Transfer","note":"Works well on unseen tasks","value":84},{"label":"Training Efficiency","note":"Less compute needed","value":95}],"caption":"BLIP-2 sets new benchmarks while saving time and resources."},{"kind":"story","kicker":"Takeaway","title":"Why BLIP-2 is a canonical paper","body":["BLIP-2 showed that you can combine the best vision and language models without costly retraining, using a clever, lightweight bridge.","This approach has inspired a wave of research into modular, reusable AI systems that can adapt quickly to new challenges."]},{"kind":"recap","kicker":"Recap","title":"four-line mental model","body":[],"recap":[{"label":"Freeze","note":"Keep vision and language models unchanged."},{"label":"Bridge","note":"Add a query transformer to
