s that make the ELECTRA pretraining process unique."],"choices":[{"label":"Small generator","note":"Suggests plausible replacement words."},{"label":"Replaced token detection","note":"Main training task for the discriminator."},{"label":"Discriminator","note":"Learns to spot replaced words in the sentence."},{"label":"No [MASK] tokens","note":"Input sentences always look natural."},{"label":"All-token supervision","note":"Every word provides a learning signal."},{"label":"Efficient use of compute","note":"Learns more per training step than MLM."}]},{"kind":"results","kicker":"Why it mattered","title":"ELECTRA's impact on model efficiency","body":["ELECTRA models outperform BERT and even rival RoBERTa and XLNet while using less compute, especially for smaller models.","On the GLUE benchmark, ELECTRA trained with less hardware matches or beats models trained with much more data and time."],"bars":[{"label":"GLUE score (small model)","note":"ELECTRA outperforms GPT with 30x less compute","value":90},{"label":"Compute needed (relative)","note":"Fraction of compute versus RoBERTa or XLNet","value":25},{"label":"All-token supervision","note":"ELECTRA uses every word for training","value":100},{"label":"Performance at scale","note":"Matches or beats top models","value":85}],"caption":"ELECTRA achieves strong results with less compute by learning from every word."},{"kind":"story","kicker":"Takeaway","title":"Why ELECTRA changed pretraining","body":["ELECTRA showed that language models can learn more efficiently by focusing on detecting subtle changes, not just filling in blanks.","Its approach inspired new pretraining strategies and proved that clever learning tasks can reduce the need for massive compute."]},{"kind":"recap","kicker":"Recap","title":"four-line mental model","body":[],"recap":[{"label":"Replace","note":"A generator swaps some words for plausible alternatives."},{"label":"Detect","note":"The discriminator decides if each word is original or fake."},{"label":
