e building blocks that turn a transformer into a reinforcement learning agent."],"choices":[{"label":"Trajectory dataset","note":"Provides the sequences of states, actions, and rewards."},{"label":"Transformer model","note":"Learns to model sequences and dependencies."},{"label":"Return-to-go input","note":"Specifies the future reward the agent should aim for."},{"label":"Causal masking","note":"Prevents the model from peeking at future actions or rewards."},{"label":"Offline RL setup","note":"Trains entirely from previously collected data."},{"label":"Sequence prediction objective","note":"Trains the model to predict the next action in the sequence."}]},{"kind":"results","kicker":"Why it mattered","title":"How well does it work?","body":["Decision Transformer matches or outperforms traditional RL and imitation learning on several Atari and robotic control benchmarks.","It shows that sequence models can be powerful RL agents, especially when working with large offline datasets."],"bars":[{"label":"Atari score","note":"Performance on Atari games","value":80},{"label":"Robotic control","note":"Success on continuous control tasks","value":75},{"label":"Offline RL","note":"Ability to learn from static data","value":90},{"label":"Imitation learning","note":"Matching expert trajectories","value":70}],"caption":"Decision Transformer shows strong results across classic RL and imitation learning settings."},{"kind":"story","kicker":"Takeaway","title":"Why this paper is a landmark","body":["Decision Transformer opened a new path by unifying reinforcement learning and sequence modeling, making RL more flexible and data-driven.","Its success inspired a wave of research using transformers for control and planning, making it a cornerstone in modern AI."]},{"kind":"recap","kicker":"Recap","title":"four-line mental model","body":[],"recap":[{"label":"Collect","note":"Use past trajectories of states, actions, and rewards."},{"label":"Sequence","note":"Treat RL as a sequence modeling
