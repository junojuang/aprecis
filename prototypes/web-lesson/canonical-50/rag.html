input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:2px;background:rgba(19,132,129,.25);outline:none}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--teal);box-shadow:0 1px 4px rgba(0,0,0,.2)}.choicegrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}.choice{border:1px solid var(--line);background:white;border-radius:14px;padding:12px;text-align:left}.choice b{display:block;font:700 13px var(--sans);margin-bottom:4px}.choice span{font:13px/1.35 var(--serif);color:var(--muted)}.choice.on{border-color:var(--teal);background:rgba(19,132,129,.08)}.twocol{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}.mini{border:1px solid var(--line);border-radius:14px;background:white;padding:12px}.mini h2{margin:0 0 8px;font:800 10px var(--sans);letter-spacing:1.3px;text-transform:uppercase;color:var(--muted)}.mini p{margin:0;font:14px/1.35 var(--serif)}.src{width:100%;display:flex;gap:10px;align-items:center;text-align:left;border:1px solid rgba(19,132,129,.35);background:white;border-radius:14px;padding:14px}.src small{display:block;color:var(--teal);font:800 9px var(--sans);letter-spacing:1.5px;text-transform:uppercase}.src b{font:600 14px var(--serif)}.quote{font:italic 22px/1.45 var(--serif)}

<script type="application/json" id="lesson-data">{"paper_id":"rag","short_name":"RAG models","title":"Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks","authors":"Patrick Lewis, Ethan Perez, Aleksandra Piktus, Fabio Petroni et al.","year":2020,"topic":"Retrieval","difficulty":"Intermediate","url":"https://arxiv.org/abs/2005.11401","arxiv_id":"2005.11401","hook":"Imagine a chatbot that can instantly look up facts before answering you.","promise":"You will understand how RAG lets language models retrieve knowledge before generating answers.","prerequisite_note":"Bring a curiosity for how language models might pull in outside information while they write.","glossary":[{"term":"Parametric memory","plain":"The knowledge stored inside a model's parameters after training."},{"term":"Non-parametric memory","plain":"External knowledge sources, like a database or documents, that the model can consult at runtime."},{"term":"Retriever","plain":"A system that finds relevant documents from a large collection based on a query."},{"term":"Seq2seq model","plain":"A neural network that turns one sequence, like a question, into another, like an answer."},{"term":"Dense vector index","plain":"A way to represent documents as vectors so the model can quickly search for similar ones."},{"term":"Knowledge-intensive task","plain":"A problem that requires specific factual information to answer correctly."}],"related_slugs":["colbert","dpr","t5","gpt3","realm"],"cards":[{"kind":"cover","kicker":"Aprecis · Retrieval","title":"Let models look things up","body":["Learn how RAG lets AI models search for facts before writing answers."]},{"kind":"story","kicker":"Start here","title":"Why memory matters for language models","body":["Imagine asking a language model for a recent fact, like the latest Nobel Prize winner. If it was trained before that event, it cannot know the answer.","What if the model could instantly search Wikipedia or another resource for up-to-date facts? Retrieval-Augmented Generation, or RAG, makes this possible."]},{"kind":"map","kicker":"The map","title":"How RAG connects searching and writing","body":["Traditional models answer based only on what they remember from training, missing new or rare facts.","RAG first uses a retriever to find relevant documents, then feeds them into a language model that writes the answer using both its memory and the new information.","The result is a model that can answer questions with up-to-date details, and even cite where it found them."],"left":"Question arrives","middle":"Retrieve relevant passages","right":"Generate answer using both memories","caption":"RAG combines searching and generation for more factual, flexible answers."},{"kind":"compare","kicker":"Try it","title":"How answers change when models can retrieve","body":["Imagine asking for the population of a small city. Toggle to see what happens."],"offLabel":"Parametric only","onLabel":"RAG","offNote":"Model guesses based on outdated or missing information from its training.","onNote":"Model retrieves the latest data from Wikipedia, then writes a more accurate answer."},{"kind":"story","kicker":"Core idea","title":"Blending retrieval with generation","body":["RAG’s key trick is to let the language model consult an external memory, like a search engine, while generating each answer.","Instead of memorizing everything, the model learns to retrieve relevant passages and combine them with its own knowledge to write more factual, grounded responses."]},{"kind":"slider","kicker":"Feel the tradeoff","title":"How much should the model rely on retrieval?","body":["Slide to see what happens as the model trusts retrieved documents more or less."],"lowLabel":"All parametric","highLabel":"All retrieval","low":"Relies only on training memory, may miss rare or new facts.","mid":"Balances both memories, using retrieval for specifics and model memory for language.","high":"Copies mostly from retrieved documents, but may lose fluency or context."},{"kind":"chooser","kicker":"Build it","title":"Choose RAG’s key ingredients","body":["Pick the components that let RAG models combine searching and generating."],"choices":[{"label":"Pre-trained seq2seq model","note":"Writes answers using language knowledge."},{"label":"Dense vector retriever","note":"Finds relevant passages for each question."},{"label":"Wikipedia index","note":"Provides the external knowledge base to search."},{"label":"Token-level conditioning","note":"Lets the model switch passages as it writes each word."},{"label":"End-to-end fine-tuning","note":"Trains both retrieval and generation together."},{"label":"Non-parametric memory","note":"Stores up-to-date facts outside the model parameters."}]},{"kind":"results","kicker":"Why it mattered","title":"RAG sets new benchmarks in open-domain QA","body":["RAG models outperformed previous methods on open-domain question answering, especially where up-to-date or rare facts were needed.","They also generated answers that were more specific, diverse, and grounded in real sources, beating parametric-only models."],"bars":[{"label":"Open-domain QA accuracy","note":"RAG achieves a new benchmark high","value":94},{"label":"Specificity of answers","note":"Answers are more detailed","value":88},{"label":"Diversity","note":"Less repetition, more variety","value":82},{"label":"Factual grounding","note":"Answers cite real sources","value":91}],"caption":"RAG’s results showed clear improvements in factual and diverse answer generation."},{"kind":"story","kicker":"Takeaway","title":"Why RAG changed language models","body":["RAG was a turning point because it let models answer questions using current, external knowledge, not just what they memorized during training.","It paved the way for future systems that blend search and generation, making AI more trustworthy and adaptable."]},{"kind":"recap","kicker":"Recap","title":"four-line mental model","body":[],"recap":[{"label":"Ask","note":"A question arrives for the model."},{"label":"Retrieve","note":"The model searches documents for relevant facts."},{"label":"Generate","note":"It writes an answer using both memories."},{"label":"Ground","note":"The answer cites and relies on real sources."}]},{"kind":"source","kicker":"Original paper","title":"Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks","body":["Read the full paper to see how RAG changed the way language models use knowledge."]}]}</script>
<script>

function cardHtml(c){const body=(c.body||[]).map(P).join("");if(c.kind==="cover")return '<div class="cover"><div class="eyebrow">'+esc(c.kicker)+'</div><div class="grow"></div><h1>'+esc(c.title).replace(/: /,"<br><span class=\"amber\">")+'</span></h1><div class="stand">'+esc((c.body||[])[0]||LESSON.promise)+'</div><div class="grow"></div></div>';if(c.kind==="map")return '<div class="stack"><div class="sp"></div><div class="panel">'+flow(c.left,c.middle,c.right)+'</div><div class="caption">'+esc(c.caption)+'</div><div class="kicker">'+esc(c.kicker)+'</div><h1>'+esc(c.title)+'</h1>'+body+'</div>';if(c.kind==="compare")return '<div class="stack"><div class="sp"></div><div class="kicker">'+esc(c.kicker)+'</div><h1>'+esc(c.title)+'</h1>'+body+'<div class="switches"><button class="sw on" id="off">'+esc(c.offLabel)+'</button><button class="sw" id="on">'+esc(c.onLabel)+'</button></div><div class="status"><span class="dot" id="td"></span><div class="t" id="tn">'+esc(c.offNote)+'</div></div></div>';if(c.kind==="slider")return '<div class="stack"><div class="sp"></div><div class="kicker">'+esc(c.kicker)+'</div><h1>'+esc(c.title)+'</h1>'+body+'<input id="sl" type="range" min="0" max="100" value="0"><div class="bars"><div class="barrow"><div class="lab">'+esc(c.lowLabel)+'</div><div class="bar"><i id="lb"></i></div><div class="num" id="ln">100%</div></div><div class="barrow"><div class="lab">'+esc(c.highLabel)+'</div><div class="bar"><i id="rb"></i></div><div class="num" id="rn">0%</div></div></div><div class="status"><span class="dot" id="sd"></span><div class="t" id="sn">'+esc(c.low)+'</div></div></div>';if(c.kind==="chooser")return '<div class="stack"><div class="sp"></div><div class="kicker">'+esc(c.kicker)+'</div><h1>'+esc(c.title)+'</h1>'+body+'<div class="choicegrid">'+(c.choices||[]).map((x,i)=>'<button class="choice" data-i="'+i+'"><b>'+esc(x.label)+'</b><span>'+esc(x.note)+'</span></button>').join("")+'</div><div class="status"><span class="dot" id="cd"></span><div class="t" id="ct">Pick at least three ingredients.</div></div></div>';if(c.kind==="results")return '<div class="stack"><div class="sp"></div><div class="kicker">'+esc(c.kicker)+'</div><h1>'+esc(c.title)+'</h1>'+body+'<div class="panel">'+bars(c.bars)+'</div><div class="caption">'+esc(c.caption)+'</div></div>';if(c.kind==="recap")return '<div class="stack"><div class="sp"></div><div class="kicker">'+esc(c.kicker)+'</div><h1>'+esc(c.title)+'</h1><div class="twocol">'+(c.recap||[]).map((r,i)=>'<div class="mini"><h2>'+(i+1)+' · '+esc(r.label)+'</h2><p>'+esc(r.note)+'</p></div>').join("")+'</div></div>';if(c.kind==="source")return '<div class="stack"><div class="sp big"></div><div class="kicker">'+esc(c.kicker)+'</div><div class="quote">'+esc((c.body||[])[0]||LESSON.hook)+'</div><div class="caption">'+esc(LESSON.authors)+' · '+LESSON.year+'</div><button class="src" id="src"><span><small>Original paper</small><b>'+esc(LESSON.title)+'</b></span></button></div>';return '<div class="stack"><div class="sp"></div><div class="kicker">'+esc(c.kicker)+'</div><h1>'+esc(c.title)+'</h1>'+body+'</div>'}
const cards=LESSON.cards;const explored=new Set();let idx=0;const stage=document.getElementById("stage"),rail=document.getElementById("rail"),bg=document.getElementById("bg"),count=document.getElementById("count"),next=document.getElementById("next"),hint=document.getElementById("hint");rail.innerHTML=cards.map(()=>'<span class="seg"></span>').join("");stage.innerHTML=cards.map(cardHtml).map((h,i)=>'<section class="card" data-i="'+i+'">'+h+'</section>').join("");
function initCard(i){const el=stage.children[i],c=cards[i];if(c._did)return;c._did=true;if(c.kind==="compare"){const off=el.querySelector("#off"),on=el.querySelector("#on"),d=el.querySelector("#td"),n=el.querySelector("#tn");function set(v){off.classList.toggle("on",!v);on.classList.toggle("on",v);d.classList.toggle("ok",v);n.textContent=v?c.onNote:c.offNote;if(v){explored.add(i);refresh();Aprecis.success()}else Aprecis.select()}off.onclick=()=>set(false);on.onclick=()=>set(true)}if(c.kind==="slider"){const sl=el.querySelector("#sl"),lb=el.querySelector("#lb"),rb=el.querySelector("#rb"),ln=el.querySelector("#ln"),rn=el.querySelector("#rn"),d=el.querySelector("#sd"),n=el.querySelector("#sn");function draw(){const v=Number(sl.value);lb.style.width=(100-v)+"%";rb.style.width=v+"%";ln.textContent=(100-v)+"%";rn.textContent=v+"%";n.textContent=v<34?c.low:v<67?c.mid:c.high;d.classList.toggle("ok",v>55);if(v>55){explored.add(i);refresh()}Aprecis.haptic("light")}sl.oninput=draw;draw()}if(c.kind==="chooser"){const seen=new Set(),d=el.querySelector("#cd"),t=el.querySelector("#ct");el.querySelectorAll(".choice").forEach(btn=>btn.onclick=()=>{btn.classList.add("on");seen.add(btn.dataset.i);t.textContent=seen.size<3?seen.size+" selected. Keep going.":"That is the working recipe.";d.classList.toggle("ok",seen.size>=3);if(seen.size>=3){explored.add(i);refresh();Aprecis.success()}else Aprecis.select()})}if(c.kind==="source"){el.querySelector("#src").onclick=()=>Aprecis.openOriginal(LESSON.url)}}
