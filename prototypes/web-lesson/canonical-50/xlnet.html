"label":"Permutation language modeling","note":"Lets the model learn from every word order."},{"label":"No input masking","note":"Removes the train-test mismatch found in BERT."},{"label":"Autoregressive prediction","note":"Predicts one word at a time, using context."},{"label":"Bidirectional context","note":"Uses both left and right context for each prediction."},{"label":"Transformer-XL memory","note":"Remembers longer sequences for better predictions."},{"label":"Expected likelihood objective","note":"Maximizes the chance of predicting all possible permutations."}]},{"kind":"results","kicker":"Why it mattered","title":"XLNet's impact on benchmarks","body":["When tested on 20 language tasks, XLNet outperformed BERT in nearly every case, often by a large margin.","Tasks like question answering, sentiment analysis, and document ranking all saw clear gains with XLNet."],"bars":[{"label":"SQuAD 2.0","note":"Question answering","value":90},{"label":"GLUE average","note":"General language understanding","value":87},{"label":"RACE","note":"Reading comprehension","value":83},{"label":"Document ranking","note":"Retrieval performance","value":80}],"caption":"XLNet set new records on many standard language benchmarks."},{"kind":"story","kicker":"Takeaway","title":"A new standard for context","body":["XLNet proved that you do not need to mask words to learn from all directions, breaking a core limitation of BERT.","Its permutation-based approach inspired later models and set a new bar for what language understanding models could achieve."]},{"kind":"recap","kicker":"Recap","title":"XLNet in four moves","body":[],"recap":[{"label":"Shuffle","note":"Permute the order of word predictions."},{"label":"Predict","note":"Guess each word using all context."},{"label":"Remember","note":"Use Transformer-XL memory for longer sequences."},{"label":"Outperform","note":"Beat previous models on language benchmarks."}]},{"kind":"source","kicker":"Original paper","title":"XLNet: Generalized A
