redients that enable Voyager to invent and reuse skills in Minecraft."],"choices":[{"label":"Large Language Model","note":"Generates and revises Python code for new skills."},{"label":"Skill Library","note":"Stores reusable code snippets for future use."},{"label":"Automatic Evaluation","note":"Checks if a new skill works as intended in the game."},{"label":"Curriculum Generation","note":"Creates a sequence of challenges that guide skill discovery."},{"label":"Embodied Minecraft Agent","note":"Acts in the world and observes results, like a player."},{"label":"Self-Reflection Loop","note":"Agent reviews past actions to improve or invent new skills."}]},{"kind":"results","kicker":"Why it mattered","title":"Voyager outpaces other agents in Minecraft","body":["Voyager solved more unique tasks and survived longer than previous agents, showing the power of open-ended skill creation.","Its skill library grew over time, allowing it to tackle increasingly complex challenges that other agents could not handle."],"bars":[{"label":"Unique Skills Learned","note":"Voyager invents and remembers more skills","value":95},{"label":"Survival Time","note":"Agent survives longer in the game","value":88},{"label":"Task Completion","note":"Finishes more distinct in-game objectives","value":90},{"label":"Skill Reuse Rate","note":"Reuses learned skills often","value":84}],"caption":"Voyager's self-invented skills give it a clear edge in open-ended environments."},{"kind":"story","kicker":"Takeaway","title":"Why Voyager matters for AI","body":["Voyager shows that agents can go beyond human-coded routines, inventing and reusing their own skills to thrive in complex worlds.","This approach hints at a future where AI can autonomously grow its abilities, adapting to new tasks without step-by-step programming."]},{"kind":"recap","kicker":"Recap","title":"four-line mental model","body":[],"recap":[{"label":"Observe","note":"Agent faces a new problem in Minecraft."},{"label":"Invent","note":"Writes
