nd generation."]},{"kind":"recap","kicker":"Recap","title":"How attention-based translation works","body":[],"recap":[{"label":"Encode","note":"Read the input sentence into word vectors."},{"label":"Attend","note":"Compute relevance of each input word for each output step."},{"label":"Align","note":"Use attention weights to find the right context."},{"label":"Translate","note":"Generate each output word using focused information."}]},{"kind":"source","kicker":"Original paper","title":"Neural Machine Translation by Jointly Learning to Align and Translate","body":["Read the original paper to see how attention mechanisms transformed machine translation."]}]}</script>
