<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Adding Conditional Control to Text-to-Image Diffusion Models</title>
<style>
  :root{
    --paper:#f7f4ef; --ink:#11141a; --muted:#6b7078; --teal:#168383;
    --teal2:#27b2ae; --amber:#e2a33a; --rose:#cf6767; --line:rgba(17,20,26,.12);
    --dark:#10131a; --serif:ui-serif,"New York",Georgia,"Times New Roman",serif;
    --sans:-apple-system,system-ui,"SF Pro Text",sans-serif; --mono:ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;min-height:100dvh}
  body{max-width:430px;margin:0 auto;background:var(--paper);color:var(--ink);font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
  #bg{position:fixed;inset:0;z-index:-1;transition:background .35s}
  #bg.cover{background:radial-gradient(circle at 50% 30%,rgba(39,178,174,.25),transparent 58%),#10131a}
  #bg.paper{background:var(--paper)}
  #bg.focus{background:linear-gradient(to bottom,rgba(39,178,174,.12),rgba(247,244,239,0) 55%),var(--paper)}
  .chrome{height:auto;display:flex;align-items:center;gap:10px;padding:calc(8px + env(safe-area-inset-top,0px)) 18px 13px}
  .x{width:30px;height:30px;border:0;background:none;color:var(--ink);opacity:.7;font:600 15px var(--sans)}
  .rail{flex:1;display:flex;gap:4px}.seg{height:3px;flex:1;border-radius:3px;background:rgba(17,20,26,.16)}.seg.on{background:rgba(17,20,26,.85)}
  .count{width:38px;text-align:right;font:700 11px var(--mono);color:var(--muted)}
  .stage{position:relative;flex:1;min-height:0;overflow:hidden}
  .card{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 22px 24px;opacity:0;transform:translateX(18px);pointer-events:none;transition:opacity .3s,transform .3s}
  .card.active{opacity:1;transform:none;pointer-events:auto}.card.back{transform:translateX(-18px)}
  .advance{padding:9px 22px calc(24px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;gap:8px;flex:none}
  .hint{min-height:16px;text-align:center;font:italic 12px var(--serif);color:var(--muted)}
  .next{min-height:50px;border:0;border-radius:14px;background:var(--teal);color:white;font:700 15px var(--sans)}
  .next:disabled{background:rgba(17,20,26,.12);color:var(--muted)}
  .stack{display:flex;flex-direction:column;gap:16px;align-items:flex-start}.sp{height:22px}.sp.sm{height:10px}
  .kicker{font:800 11px var(--sans);letter-spacing:2px;text-transform:uppercase;color:var(--teal)}
  h1{margin:0;font:600 28px/1.16 var(--serif);letter-spacing:0;color:var(--ink)}
  .prose{margin:0;font:16px/1.52 var(--serif);color:rgba(17,20,26,.82)}.hl{background:rgba(226,163,58,.28)}.b{font-weight:700;color:var(--ink)}.term{font-weight:700;color:var(--teal)}
  .panel{width:100%;border:1px solid var(--line);background:white;border-radius:16px;padding:14px}.caption{font:italic 12px var(--serif);color:var(--muted)}
  .cover{min-height:100%;display:flex;flex-direction:column;text-align:center;align-items:center}.cover .eyebrow{padding-top:18px;color:var(--teal2);font:800 11px var(--sans);letter-spacing:2.3px;text-transform:uppercase}
  .cover h1{font-size:39px;line-height:1.05;color:#f4f1ea}.cover .amber{color:var(--amber)}.cover .stand{font:italic 15px/1.5 var(--serif);color:rgba(244,241,234,.64);padding:14px 8px 0}.grow{flex:1;min-height:16px}
  .hero{width:100%;height:220px;display:flex;align-items:center;justify-content:center}.appear{opacity:0;transform:scale(.94);transition:opacity .6s,transform .6s}.appear.in{opacity:1;transform:none}
  svg{display:block}.diagram text{font-family:ui-monospace,Menlo,monospace}.node{cursor:pointer}.node rect{transition:fill .2s,stroke .2s}.node.on rect{fill:rgba(22,131,131,.16);stroke:var(--teal)}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}.mini{border:1px solid var(--line);border-radius:14px;background:white;padding:12px}.mini h2{margin:0 0 8px;font:800 10px var(--sans);letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}.mini p{margin:0;font:14px/1.35 var(--serif)}
  .switches{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}.sw{border:1px solid var(--line);border-radius:12px;background:white;padding:11px 8px;font:800 10px var(--sans);letter-spacing:1.1px;text-transform:uppercase;color:var(--muted)}.sw.on{background:var(--teal);border-color:var(--teal);color:white}
  .status{display:flex;gap:9px;align-items:flex-start}.dot{width:9px;height:9px;border-radius:50%;background:var(--amber);margin-top:5px;flex:none}.dot.ok{background:var(--teal)}.status .t{font:600 13px/1.4 var(--serif);color:rgba(17,20,26,.8)}
  .bars{width:100%;display:flex;flex-direction:column;gap:12px}.barrow{display:grid;grid-template-columns:64px 1fr 42px;gap:10px;align-items:center}.lab{font:700 10px var(--mono);color:var(--muted)}.bar{height:16px;border-radius:999px;background:rgba(107,112,120,.13);overflow:hidden}.bar i{display:block;height:100%;width:0;background:var(--teal);border-radius:999px;transition:width .35s}.num{text-align:right;font:700 11px var(--mono)}
  .choicegrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}.choice{border:1px solid var(--line);background:white;border-radius:14px;padding:12px;text-align:left}.choice b{display:block;font:700 13px var(--sans);margin-bottom:4px}.choice span{font:13px/1.35 var(--serif);color:var(--muted)}.choice.on{border-color:var(--teal);background:rgba(22,131,131,.08)}
  .quote{font:84px/0.6 var(--serif);color:rgba(22,131,131,.45);height:38px}.pquote{font:italic 22px/1.45 var(--serif)}.src{width:100%;display:flex;gap:10px;align-items:center;text-align:left;border:1px solid rgba(22,131,131,.35);background:white;border-radius:14px;padding:14px}.src small{display:block;color:var(--teal);font:800 9px var(--sans);letter-spacing:1.5px;text-transform:uppercase}.src b{font:600 14px var(--serif)}
</style>
</head>
<body>
<div id="bg" class="cover"></div>
<div class="chrome"><button class="x" id="close" aria-label="Close">x</button><div class="rail" id="rail"></div><div class="count" id="count">1/13</div></div>
<div class="stage" id="stage"></div>
<div class="advance"><div class="hint" id="hint"></div><button class="next" id="next">Start</button></div>
<script>
const Aprecis={_s(n,b){const h=window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers[n];h?h.postMessage(b||{}):console.log("[Aprecis]",n,b||"")},haptic(s){this._s("haptic",{style:s||"soft"})},select(){this.haptic("select")},success(){this.haptic("success")},markDone(){this._s("markDone")},finish(){this._s("finish")},close(){this._s("close")},openOriginal(u){this._s("openOriginal",{url:u})}};
function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}
const P=(...x)=>`<p class="prose">${x.join("")}</p>`, pl=s=>esc(s), b=s=>`<span class="b">${esc(s)}</span>`, hl=s=>`<span class="hl">${esc(s)}</span>`, tm=s=>`<span class="term">${esc(s)}</span>`;
function heroGlyph(){return `<svg viewBox="0 0 300 190" width="300" height="190" role="img" aria-label="Prompt and pose guiding a diffusion model">
  <rect x="34" y="36" width="94" height="118" rx="18" fill="rgba(244,241,234,.08)" stroke="rgba(244,241,234,.22)"/>
  <rect x="172" y="36" width="94" height="118" rx="18" fill="rgba(39,178,174,.12)" stroke="rgba(39,178,174,.5)"/>
  <path d="M81 64 L81 122 M58 84 L104 84 M81 122 L62 142 M81 122 L101 142" stroke="#e2a33a" stroke-width="8" stroke-linecap="round"/>
  <path d="M197 74 C218 52 249 70 247 96 C245 124 218 132 193 119" fill="none" stroke="#27b2ae" stroke-width="9" stroke-linecap="round"/>
  <path d="M132 95 C146 95 154 95 168 95" stroke="rgba(244,241,234,.52)" stroke-width="4" stroke-linecap="round"/>
  <text x="81" y="174" text-anchor="middle" fill="rgba(244,241,234,.6)" font-size="11" font-family="ui-monospace,Menlo,monospace">structure</text>
  <text x="219" y="174" text-anchor="middle" fill="rgba(244,241,234,.6)" font-size="11" font-family="ui-monospace,Menlo,monospace">image</text>
</svg>`}
function cover(){return {theme:"cover",label:"Start",html:`<div class="cover"><div class="eyebrow">Aprecis · Vision</div><div class="hero appear">${heroGlyph()}</div><div class="grow"></div><h1 class="appear">The prompt said <span class="amber">what.</span><br>The map said where.</h1><div class="stand appear">2023. ControlNet gave diffusion models a clean way to follow sketches, poses, edges, depth, and masks.</div><div class="grow"></div></div>`,init(el){requestAnimationFrame(()=>el.querySelectorAll(".appear").forEach((a,i)=>setTimeout(()=>a.classList.add("in"),70+i*80)))}}}
function prose(k,t,paras){return {theme:"paper",label:"Continue",html:`<div class="stack"><div class="sp"></div><div class="kicker">${k}</div><h1>${t}</h1>${paras.join("")}<div class="sp sm"></div></div>`}}
function illus(k,t,paras,art,cap){return {theme:"paper",label:"Continue",html:`<div class="stack"><div class="sp sm"></div><div class="panel">${art}</div>${cap?`<div class="caption">${cap}</div>`:""}<div class="kicker">${k}</div><h1>${t}</h1>${paras.join("")}<div class="sp sm"></div></div>`}}
function lockArt(){return `<svg class="diagram" viewBox="0 0 320 150" width="100%" height="150"><rect x="18" y="36" width="118" height="74" rx="16" fill="rgba(22,131,131,.1)" stroke="rgba(22,131,131,.45)"/><rect x="184" y="36" width="118" height="74" rx="16" fill="rgba(226,163,58,.12)" stroke="rgba(226,163,58,.45)"/><text x="77" y="69" text-anchor="middle" fill="#168383" font-size="12" font-weight="700">LOCKED</text><text x="77" y="88" text-anchor="middle" fill="#6b7078" font-size="10">Stable Diffusion</text><text x="243" y="69" text-anchor="middle" fill="#b57814" font-size="12" font-weight="700">TRAINABLE</text><text x="243" y="88" text-anchor="middle" fill="#6b7078" font-size="10">control copy</text><path d="M137 73 H183" stroke="#11141a" stroke-width="3" opacity=".28"/><circle cx="160" cy="73" r="9" fill="#f7f4ef" stroke="#168383"/><text x="160" y="77" text-anchor="middle" fill="#168383" font-size="10" font-weight="700">0</text></svg>`}
function mapArt(){return `<svg class="diagram" viewBox="0 0 320 170" width="100%" height="170"><rect x="14" y="20" width="292" height="130" rx="18" fill="#10131a"/><path d="M44 116 C82 78 120 84 150 42 C190 90 218 56 270 102" fill="none" stroke="#e2a33a" stroke-width="7" stroke-linecap="round"/><path d="M44 116 C82 78 120 84 150 42 C190 90 218 56 270 102" fill="none" stroke="#27b2ae" stroke-width="2" stroke-dasharray="5 7" stroke-linecap="round"/><circle cx="150" cy="42" r="8" fill="#27b2ae"/><circle cx="44" cy="116" r="6" fill="#e2a33a"/><circle cx="270" cy="102" r="6" fill="#e2a33a"/><text x="160" y="146" text-anchor="middle" fill="rgba(244,241,234,.64)" font-size="11">control image anchors layout</text></svg>`}
function compareStudio(){return {theme:"focus",label:"Continue",gated:true,html:`<div class="stack"><div class="sp sm"></div><div class="kicker">Try it</div><h1>Give the model a map.</h1>${P("Tap between a text-only request and the same request with a pose map. The subject is similar, but the layout stops drifting once the control image is present.")}<div class="switches"><button class="sw on" id="prompt">Prompt only</button><button class="sw" id="control">Prompt plus map</button></div><div class="panel" id="scene">${promptOnly()}</div><div class="status"><span class="dot" id="d"></span><div class="t" id="note">A prompt can name a dancer, but it does not pin down the exact pose.</div></div></div>`,init(el,i){const p=el.querySelector("#prompt"),c=el.querySelector("#control"),scene=el.querySelector("#scene"),note=el.querySelector("#note"),d=el.querySelector("#d");function set(on){p.classList.toggle("on",!on);c.classList.toggle("on",on);scene.innerHTML=on?controlled():promptOnly();note.textContent=on?"The pose map gives the model spatial facts, so the image follows the body plan.":"Text says what to draw, but the model still guesses where arms, legs, and objects go.";d.classList.toggle("ok",on);if(on){explored.add(i);refresh();Aprecis.success()}else Aprecis.select()}p.onclick=()=>set(false);c.onclick=()=>set(true)}}}
function promptOnly(){return `<svg viewBox="0 0 300 150" width="100%" height="150"><rect width="300" height="150" rx="16" fill="#10131a"/><path d="M92 78 C118 36 178 42 204 92" fill="none" stroke="#e2a33a" stroke-width="10" stroke-linecap="round" opacity=".9"/><circle cx="139" cy="62" r="15" fill="#27b2ae"/><text x="150" y="132" text-anchor="middle" fill="rgba(244,241,234,.62)" font-size="11">good subject, loose pose</text></svg>`}
function controlled(){return `<svg viewBox="0 0 300 150" width="100%" height="150"><rect width="300" height="150" rx="16" fill="#10131a"/><path d="M150 38 L150 91 M119 61 L181 61 M150 91 L122 124 M150 91 L178 124" stroke="rgba(244,241,234,.25)" stroke-width="5" stroke-linecap="round"/><path d="M150 38 L150 91 M119 61 L181 61 M150 91 L122 124 M150 91 L178 124" stroke="#27b2ae" stroke-width="2" stroke-dasharray="5 6" stroke-linecap="round"/><circle cx="150" cy="38" r="13" fill="#e2a33a"/><text x="150" y="140" text-anchor="middle" fill="rgba(244,241,234,.62)" font-size="11">subject follows the structure</text></svg>`}
function zeroStudio(){return {theme:"focus",label:"Continue",gated:true,html:`<div class="stack"><div class="sp sm"></div><div class="kicker">Try it</div><h1>Grow control from zero.</h1>${P("ControlNet connects the frozen model and trainable branch with ",tm("zero convolutions"),". Slide training forward. The control signal starts silent, then learns to speak.")}<input id="z" type="range" min="0" max="100" value="0" style="width:100%"><div class="bars"><div class="barrow"><div class="lab">base</div><div class="bar"><i id="base"></i></div><div class="num" id="bn">100%</div></div><div class="barrow"><div class="lab">control</div><div class="bar"><i id="ctrl"></i></div><div class="num" id="cn">0%</div></div></div><div class="status"><span class="dot" id="zd"></span><div class="t" id="zn">At step zero, the added branch outputs almost nothing, so the pretrained model is not shocked by random noise.</div></div></div>`,init(el,i){const z=el.querySelector("#z"),base=el.querySelector("#base"),ctrl=el.querySelector("#ctrl"),bn=el.querySelector("#bn"),cn=el.querySelector("#cn"),d=el.querySelector("#zd"),n=el.querySelector("#zn");function draw(){const v=Number(z.value);base.style.width="100%";ctrl.style.width=v+"%";bn.textContent="100%";cn.textContent=v+"%";d.classList.toggle("ok",v>55);n.textContent=v<20?"The control path is quiet. The frozen diffusion model behaves like itself.":v<60?"The branch is learning how edges, depth, or pose should influence hidden features.":"Control is strong enough to steer layout while the frozen model keeps image skill.";if(v>55){explored.add(i);refresh()}Aprecis.haptic("light")}z.oninput=draw;draw()}}}
function conditionStudio(){const items=[["Edges","outlines and boundaries"],["Depth","front and back layout"],["Pose","body skeletons"],["Segmentation","object regions"],["Scribble","rough user intent"],["Normals","surface direction"]];return {theme:"focus",label:"Continue",gated:true,html:`<div class="stack"><div class="sp sm"></div><div class="kicker">Try it</div><h1>Choose the kind of control.</h1>${P("The paper is not just one trick for poses. It tested many spatial conditions, each giving diffusion a different kind of handle.")}<div class="choicegrid">${items.map(([a,b],idx)=>`<button class="choice" data-i="${idx}"><b>${a}</b><span>${b}</span></button>`).join("")}</div><div class="status"><span class="dot" id="cd"></span><div class="t" id="ct">Pick at least three controls. Notice that all of them are images that say where things should go.</div></div></div>`,init(el,i){const seen=new Set(),d=el.querySelector("#cd"),t=el.querySelector("#ct");el.querySelectorAll(".choice").forEach(btn=>btn.onclick=()=>{btn.classList.toggle("on",true);seen.add(btn.dataset.i);t.textContent=seen.size<3?`${seen.size} selected. Keep going.`:"That is the generality: edges, depth, pose, masks, and scribbles can all become control signals.";d.classList.toggle("ok",seen.size>=3);if(seen.size>=3){explored.add(i);refresh();Aprecis.success()}else Aprecis.select()})}}}
function resultBars(){return `<div class="bars"><div class="barrow"><div class="lab">small data</div><div class="bar"><i style="width:58%"></i></div><div class="num">&lt;50k</div></div><div class="barrow"><div class="lab">large data</div><div class="bar"><i style="width:96%"></i></div><div class="num">&gt;1m</div></div><div class="barrow"><div class="lab">controls</div><div class="bar"><i style="width:86%"></i></div><div class="num">many</div></div></div>`}
function recap(){return {theme:"paper",label:"Finish",html:`<div class="stack"><div class="sp"></div><div class="kicker">Recap</div><h1>ControlNet, in three lines</h1><div class="twocol"><div class="mini"><h2>1 · Preserve</h2><p>Keep the pretrained diffusion model frozen so its image knowledge survives.</p></div><div class="mini"><h2>2 · Copy</h2><p>Train a parallel branch that learns the extra spatial condition.</p></div><div class="mini"><h2>3 · Connect</h2><p>Use zero convolutions so control grows in gently instead of breaking the model.</p></div><div class="mini"><h2>4 · Steer</h2><p>Edges, depth, pose, masks, and scribbles become layout handles.</p></div></div></div>`}}
function source(){return {theme:"paper",label:"Done",html:`<div class="stack"><div class="sp"></div><div class="quote">“</div><div class="pquote">A prompt can ask for a dancer. ControlNet can hand the model the dancer's pose.</div><div class="caption">Zhang, Rao, and Agrawala · Stanford · 2023</div><button class="src" id="src"><span><small>Original paper</small><b>Adding Conditional Control to Text-to-Image Diffusion Models</b></span></button></div>`,init(el){el.querySelector("#src").onclick=()=>Aprecis.openOriginal("https://arxiv.org/abs/2302.05543")}}}
const cards=[
  cover(),
  prose("Start here","Text is a weak steering wheel",[P("Stable Diffusion could make beautiful images from text, but text is vague about exact layout."),P("Try describing a pose, a room depth map, or the outline of a product with words alone. You can say ",hl("what"),", but the model still guesses ",hl("where"),".")]),
  illus("The missing input","Give diffusion a map",[P("ControlNet adds a second input: an image-like condition such as an edge map, depth map, segmentation mask, scribble, or human pose."),P("That condition is not the final picture. It is a ",tm("spatial guide")," the diffusion model can follow while it still uses the text prompt for subject and style.")],mapArt(),"The condition gives layout. The prompt still gives meaning."),
  compareStudio(),
  prose("One idea first","Do not damage the artist",[P("The obvious danger is fine-tuning a huge image model until it forgets what made it useful."),P("ControlNet avoids that by keeping the original diffusion model ",b("locked"),". The old model keeps its image skill. A separate copy learns the new control signal.")]),
  illus("The architecture","A locked model plus a trainable twin",[P("For a neural block, ControlNet freezes the original block and clones a trainable copy. The copy receives the condition, then feeds learned corrections back into the locked path."),P("In Stable Diffusion, this means the production-ready U-Net stays stable while the control branch learns how structure should influence hidden features.")],lockArt(),"Locked path preserves skill. Trainable path learns control."),
  zeroStudio(),
  prose("Why zeros matter","The new branch starts silent",[P("The paper connects the two paths using ",tm("zero convolutions"),": 1 by 1 convolution layers whose weights and biases start at zero."),P("At the first training step, the control branch cannot inject random junk. It begins with no effect, then gradually learns useful control.")]),
  conditionStudio(),
  illus("The test","Many maps, one recipe",[P("The authors test controls including Canny edges, Hough lines, scribbles, human pose, segmentation, depth, and normal maps."),P("The same idea works with small datasets below 50k examples and large datasets above 1m examples, because the frozen model supplies a strong visual backbone.")],resultBars(),"ControlNet is a general adapter pattern, not just a pose trick."),
  prose("The payoff","Layout becomes editable",[P("After ControlNet, image generation feels less like asking and hoping. You can sketch a composition, extract edges from a reference, use a depth map, or place a character pose."),P("The prompt still paints the world. The control image ",hl("anchors the geometry"),".")]),
  recap(),
  source()
];
let idx=0,last=0;const explored=new Set();const stage=document.getElementById("stage"),rail=document.getElementById("rail"),bg=document.getElementById("bg"),count=document.getElementById("count"),next=document.getElementById("next"),hint=document.getElementById("hint");
rail.innerHTML=cards.map(()=>`<span class="seg"></span>`).join("");
stage.innerHTML=cards.map((c,i)=>`<section class="card" data-i="${i}">${c.html}</section>`).join("");
function refresh(){document.querySelectorAll(".seg").forEach((s,i)=>s.classList.toggle("on",i<=idx));document.querySelectorAll(".card").forEach((c,i)=>{c.classList.toggle("active",i===idx);c.classList.toggle("back",i<idx)});bg.className=cards[idx].theme;count.textContent=`${idx+1}/${cards.length}`;const gated=cards[idx].gated&&!explored.has(idx);next.disabled=gated;hint.textContent=gated?"Try the interaction to continue":"";next.textContent=idx===0?"Start":idx===cards.length-1?"Done":cards[idx].label||"Continue";if(cards[idx].init&&!cards[idx]._did){cards[idx]._did=true;cards[idx].init(stage.children[idx],idx)}}
function go(n){if(n<0||n>=cards.length)return;last=idx;idx=n;refresh();Aprecis.select();if(idx===cards.length-1)Aprecis.markDone()}
function previous(){go(idx-1)}function forward(){if(idx===cards.length-1){Aprecis.finish();return}if(!next.disabled)go(idx+1)}
next.onclick=forward;document.getElementById("close").onclick=()=>Aprecis.close();
let sx=0,sy=0,st=0;stage.addEventListener("touchstart",e=>{const t=e.touches[0];sx=t.clientX;sy=t.clientY;st=Date.now()},{passive:true});stage.addEventListener("touchend",e=>{const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.4&&Date.now()-st<700){dx>0?previous():forward()}},{passive:true});
refresh();
</script>
</body>
</html>
